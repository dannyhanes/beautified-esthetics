<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- cream disc so the mark reads on both light and dark browser chrome -->
  <circle cx="32" cy="32" r="31" fill="#fdfbf5"/>
  <!-- gold ring, open at the lower left like the logo -->
  <path d="M 18.5 55.5 A 27 27 0 1 0 12.5 18" fill="none" stroke="#bb9245" stroke-width="2.4" stroke-linecap="round"/>
  <!-- four gold dots trailing the ring's lower gap -->
  <circle cx="26" cy="58.2" r="1.9" fill="#bb9245"/>
  <circle cx="31.5" cy="59.2" r="1.6" fill="#bb9245"/>
  <circle cx="36.8" cy="59.4" r="1.3" fill="#bb9245"/>
  <circle cx="41.6" cy="58.9" r="1.1" fill="#bb9245"/>
  <!-- laurel sprig sweeping up the left, echoing the logo -->
  <path d="M 16 56 C 10 42 10 26 22 10" fill="none" stroke="#7d9791" stroke-width="1.7" stroke-linecap="round"/>
  <g fill="#96adab">
    <ellipse cx="11.5" cy="47" rx="7.2" ry="2.9" transform="rotate(-38 11.5 47)" opacity="0.85"/>
    <ellipse cx="20" cy="41.5" rx="7.6" ry="3" transform="rotate(24 20 41.5)" fill="#a9c4bd" opacity="0.9"/>
    <ellipse cx="9.5" cy="35" rx="7.4" ry="2.9" transform="rotate(-22 9.5 35)" fill="#8fa99f" opacity="0.8"/>
    <ellipse cx="19.5" cy="29.5" rx="7.2" ry="2.8" transform="rotate(36 19.5 29.5)" opacity="0.95"/>
    <ellipse cx="10.5" cy="22.5" rx="6.8" ry="2.7" transform="rotate(-10 10.5 22.5)" fill="#a9c4bd" opacity="0.8"/>
    <ellipse cx="20.5" cy="16.5" rx="6.4" ry="2.6" transform="rotate(48 20.5 16.5)" fill="#8fa99f" opacity="0.9"/>
    <ellipse cx="24.5" cy="9.5" rx="5.6" ry="2.4" transform="rotate(68 24.5 9.5)" opacity="0.85"/>
  </g>
</svg>
